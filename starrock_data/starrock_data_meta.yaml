- id: col.adjust_retention.d7_rate
  type: column
  name: d7_rate
  table: table.adjust_retention
  data_type: FLOAT
  description: Day-7 retention rate (0.0–1.0).

- id: col.adjust_retention.d30_rate
  type: column
  name: d30_rate
  table: table.adjust_retention
