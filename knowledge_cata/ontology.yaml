# Flood-It! Gaming Analytics — Data Catalog (table, column nodes)

# ============================================================
# TABLES
# ============================================================

# --- Raw / DWD Layer ---

- id: table.events
  type: table
  name: GA4 Event Log
  table_name: events
  description: The core event-level table exported from Google Analytics for Firebase, containing all tracked player interactions in the Flood-It! puzzle game. Sourced from firebase-public-project.analytics_153293282.events_*. Each row represents one discrete event such as a screen view, level start, ad impression, or purchase. This is the single source of truth for all downstream engagement and monetization metrics.
  grain: event
  timestamp_column: event_timestamp
  primary_keys:
  - event_timestamp
  - user_pseudo_id
  - event_name
  partitions:
  - event_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.user_properties
  type: table
  name: Player Properties Snapshot
  table_name: user_properties
  description: Player properties snapshot table extracted from the GA4 user_properties repeated field. Stores the latest set of player attributes such as first_open_time, engagement level, and custom user properties. Used for player segmentation, cohort construction, and enriching event-level analysis with stable user traits.
  grain: snapshot
  timestamp_column: snapshot_date
  primary_keys:
  - user_pseudo_id
  - property_name
  partitions:
  - snapshot_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.crashlytics_reports
  type: table
  name: Crashlytics Reports
  table_name: crashlytics_reports
  description: Firebase Crashlytics crash and error reports. Records application crashes, non-fatal errors, and ANR (Application Not Responding) events with stack traces and device context. Used for stability monitoring, crash-free user rate tracking, and prioritizing bug fixes that impact player experience and retention.
  grain: event
  timestamp_column: event_date
  primary_keys:
  - report_id
  partitions:
  - event_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

# --- DWS Aggregation Layer ---

- id: table.dws_daily_active_users
  type: table
  name: Daily Active Users
  table_name: dws_daily_active_users
  description: Daily active user metrics aggregation. Pre-computed DAU, WAU, and MAU broken down by platform, country, and user type. The primary source for player engagement KPIs and executive dashboards. Enables fast time-series analysis of player base growth without scanning the raw event log.
  grain: daily_dimension
  timestamp_column: date
  primary_keys:
  - date
  - platform
  - country
  partitions:
  - date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dws_revenue_daily
  type: table
  name: Daily Revenue
  table_name: dws_revenue_daily
  description: Daily revenue aggregation across all monetization channels. Combines in-app purchase (IAP) revenue, advertising revenue, and subscription revenue into a unified daily view. Includes derived metrics such as ARPU (average revenue per user), ARPPU (average revenue per paying user), and paying user conversion rate. The single source for all revenue reporting.
  grain: daily_dimension
  timestamp_column: date
  primary_keys:
  - date
  - platform
  - country
  partitions:
  - date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dws_level_funnel
  type: table
  name: Level Completion Funnel
  table_name: dws_level_funnel
  description: Level completion funnel metrics tracking player progression through game levels. Captures starts, completions, failures, time spent, and retry patterns for each level. Essential for game design optimization, difficulty curve balancing, and identifying levels that cause excessive player drop-off.
  grain: daily_level
  timestamp_column: date
  primary_keys:
  - date
  - level_number
  partitions:
  - date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dws_session_stats
  type: table
  name: Session Statistics
  table_name: dws_session_stats
  description: Player session statistics aggregated daily by platform and country. Includes session counts, duration distributions, depth metrics, and engagement patterns. Used for understanding play behavior, identifying engagement trends, and benchmarking session quality across player segments.
  grain: daily_dimension
  timestamp_column: date
  primary_keys:
  - date
  - platform
  - country
  partitions:
  - date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dws_retention_cohort
  type: table
  name: Retention Cohort Analysis
  table_name: dws_retention_cohort
  description: Player retention cohort analysis with pre-computed retention rates by install cohort. Tracks D1 through D30 retention broken down by platform and country. The key table for measuring long-term player engagement, game stickiness, and the impact of game updates on player loyalty.
  grain: cohort_day
  timestamp_column: cohort_date
  primary_keys:
  - cohort_date
  - platform
  - country
  partitions:
  - cohort_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dws_acquisition_channel
  type: table
  name: Acquisition Channel Performance
  table_name: dws_acquisition_channel
  description: User acquisition channel performance metrics aggregated daily. Tracks installs, costs, revenue, and ROI by acquisition source, medium, and campaign. Used for marketing ROI analysis, budget allocation optimization, and identifying the most cost-effective channels for player acquisition.
  grain: daily_channel
  timestamp_column: date
  primary_keys:
  - date
  - source
  - medium
  partitions:
  - date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

# --- DIM Dimension Layer ---

- id: table.dim_events
  type: table
  name: Event Dimension
  table_name: dim_events
  description: Event name dimension table providing business context for raw event data. Maps event names to categories, human-readable descriptions, and metadata flags. Distinguishes auto-collected events from custom events, and identifies which events are marked as conversions for attribution and funnel analysis.
  grain: snapshot
  timestamp_column: null
  primary_keys:
  - event_name
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dim_countries
  type: table
  name: Country Dimension
  table_name: dim_countries
  description: Country and region dimension table providing geographic reference data for player segmentation and regional analysis. Includes hierarchical geography (country, sub-continent, continent), local currency codes, and market tier classifications used for revenue normalization and regional strategy.
  grain: snapshot
  timestamp_column: null
  primary_keys:
  - country_code
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dim_devices
  type: table
  name: Device Dimension
  table_name: dim_devices
  description: Device dimension table containing reference data for device models, brands, and operating systems. Used for device-level performance analysis, compatibility testing prioritization, and understanding the hardware landscape of the player base to guide optimization efforts.
  grain: snapshot
  timestamp_column: null
  primary_keys:
  - device_model
  - operating_system
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.dim_items
  type: table
  name: In-Game Item Catalog
  table_name: dim_items
  description: Master data for all virtual goods, currency packs, and purchasable items in the game. Contains pricing, categorization, rarity, and consumability attributes. Links to revenue and purchase event analysis, enabling monetization teams to evaluate item performance and optimize the in-game economy.
  grain: snapshot
  timestamp_column: null
  primary_keys:
  - item_id
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

# --- ADS Application Layer ---

- id: table.ads_player_ltv
  type: table
  name: Player Lifetime Value
  table_name: ads_player_ltv
  description: ML-generated player lifetime value predictions combining historical spending behavior with engagement signals. Provides per-player LTV estimates, confidence scores, percentile rankings, and segment assignments. Used for player valuation, high-value player identification, and marketing targeting to maximize return on acquisition spend.
  grain: player_snapshot
  timestamp_column: prediction_date
  primary_keys:
  - user_pseudo_id
  - prediction_date
  partitions:
  - prediction_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.ads_churn_prediction
  type: table
  name: Churn Risk Prediction
  table_name: ads_churn_prediction
  description: ML model output scoring each player's likelihood of churning within the next 7 days. Includes risk tiers, engagement scores, win-back likelihood, and recommended retention actions. Enables proactive retention interventions such as push notifications, bonus rewards, or personalized offers targeted at at-risk players.
  grain: player_snapshot
  timestamp_column: prediction_date
  primary_keys:
  - user_pseudo_id
  - prediction_date
  partitions:
  - prediction_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.ads_ab_test_results
  type: table
  name: A/B Test Results
  table_name: ads_ab_test_results
  description: Aggregated outcomes of Firebase A/B Testing and Remote Config experiments. Contains statistical significance metrics including p-values, sample sizes, conversion rates, and revenue impact per variant. The authoritative source for data-driven game design decisions, feature rollout evaluations, and monetization experiments.
  grain: experiment_variant
  timestamp_column: start_date
  primary_keys:
  - experiment_id
  - variant
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

- id: table.ads_player_segmentation
  type: table
  name: Player Behavioral Segments
  table_name: ads_player_segmentation
  description: ML-driven player segmentation combining engagement patterns, monetization behavior, and progression signals into actionable player clusters. Assigns each player a behavioral segment, monetization tier, and engagement level. Used for targeted communications, personalized in-game experiences, and LiveOps campaign planning.
  grain: player_snapshot
  timestamp_column: segment_date
  primary_keys:
  - user_pseudo_id
  - segment_date
  partitions:
  - segment_date
  database: bigquery
  owner: analytics_team
  schema: floodit_analytics

# ============================================================
# COLUMNS
# ============================================================

# --- events columns ---

- id: column.events.event_date
  type: column
  name: event_date
  table: table.events
  data_type: STRING
  description: The date on which the event was logged, formatted as YYYYMMDD. Used as the partition key for efficient date-range queries.

- id: column.events.event_timestamp
  type: column
  name: event_timestamp
  table: table.events
  data_type: BIGINT
  description: Unix timestamp in microseconds when the event was logged on the client device. Primary ordering key for event sequencing.

- id: column.events.event_name
  type: column
  name: event_name
  table: table.events
  data_type: STRING
  description: The name of the event (e.g., level_start, level_end, ad_impression, in_app_purchase). Joins to dim_events for category and description lookups.
  entity: entity.event

- id: column.events.event_value_in_usd
  type: column
  name: event_value_in_usd
  table: table.events
  data_type: DOUBLE
  description: The monetary value associated with the event, converted to US dollars. Populated for purchase and ad revenue events; null for non-monetization events.

- id: column.events.user_pseudo_id
  type: column
  name: user_pseudo_id
  table: table.events
  data_type: STRING
  description: The pseudonymous identifier for the player, generated by the Firebase SDK. The primary player key used across all analytics tables.
  entity: entity.player

- id: column.events.user_id
  type: column
  name: user_id
  table: table.events
  data_type: STRING
  description: The developer-assigned user ID, set via the setUserId API. May be null if the player has not signed in or the app does not set this property.

- id: column.events.platform
  type: column
  name: platform
  table: table.events
  data_type: STRING
  description: The platform on which the event was recorded (e.g., ANDROID, IOS, WEB). Used for platform-level segmentation and performance comparison.

- id: column.events.device_category
  type: column
  name: device_category
  table: table.events
  data_type: STRING
  description: The category of the device (e.g., mobile, tablet, desktop). Useful for understanding player behavior differences across form factors.

- id: column.events.device_mobile_brand
  type: column
  name: device_mobile_brand
  table: table.events
  data_type: STRING
  description: The brand of the mobile device (e.g., Samsung, Google, Apple). Used for device-level performance analysis and hardware compatibility tracking.

- id: column.events.device_operating_system
  type: column
  name: device_operating_system
  table: table.events
  data_type: STRING
  description: The operating system of the device (e.g., Android, iOS). Combined with os_version for detailed platform compatibility analysis.

- id: column.events.geo_country
  type: column
  name: geo_country
  table: table.events
  data_type: STRING
  description: The country where the event was recorded, derived from the player's IP address. Joins to dim_countries for regional hierarchy and tier classification.

- id: column.events.geo_city
  type: column
  name: geo_city
  table: table.events
  data_type: STRING
  description: The city where the event was recorded, derived from the player's IP address. Provides sub-country geographic granularity for localized analysis.

- id: column.events.app_version
  type: column
  name: app_version
  table: table.events
  data_type: STRING
  description: The version of the application at the time the event was logged. Critical for tracking feature adoption, crash rates, and performance regressions across releases.

- id: column.events.traffic_source
  type: column
  name: traffic_source
  table: table.events
  data_type: STRING
  description: The traffic source that originally acquired the player (e.g., google, facebook, organic). Used for first-touch attribution and acquisition channel analysis.

- id: column.events.traffic_medium
  type: column
  name: traffic_medium
  table: table.events
  data_type: STRING
  description: The medium of the traffic source (e.g., cpc, organic, referral). Combined with traffic_source for complete acquisition channel attribution.

# --- user_properties columns ---

- id: column.user_properties.user_pseudo_id
  type: column
  name: user_pseudo_id
  table: table.user_properties
  data_type: STRING
  description: The pseudonymous player identifier linking properties back to the events table and all downstream analytics.
  entity: entity.player

- id: column.user_properties.property_name
  type: column
  name: property_name
  table: table.user_properties
  data_type: STRING
  description: The name of the user property (e.g., first_open_time, engagement_level, player_tier). Defines what attribute is being stored.

- id: column.user_properties.string_value
  type: column
  name: string_value
  table: table.user_properties
  data_type: STRING
  description: The string value of the user property, when the property is text-typed. Mutually exclusive with int_value and double_value for a given property.

- id: column.user_properties.int_value
  type: column
  name: int_value
  table: table.user_properties
  data_type: BIGINT
  description: The integer value of the user property, when the property is integer-typed. Used for numeric properties like total sessions or level reached.

- id: column.user_properties.double_value
  type: column
  name: double_value
  table: table.user_properties
  data_type: DOUBLE
  description: The floating-point value of the user property, when the property is decimal-typed. Used for properties like lifetime revenue or engagement score.

- id: column.user_properties.set_timestamp
  type: column
  name: set_timestamp
  table: table.user_properties
  data_type: BIGINT
  description: Unix timestamp in microseconds when this property value was last set. Used to determine the recency of player attribute data.

- id: column.user_properties.snapshot_date
  type: column
  name: snapshot_date
  table: table.user_properties
  data_type: STRING
  description: The date of the snapshot in YYYYMMDD format. Partition key enabling point-in-time lookups of player properties.

# --- crashlytics_reports columns ---

- id: column.crashlytics_reports.report_id
  type: column
  name: report_id
  table: table.crashlytics_reports
  data_type: STRING
  description: Unique identifier for the crash or error report. Primary key for deduplication and individual report lookup.

- id: column.crashlytics_reports.event_date
  type: column
  name: event_date
  table: table.crashlytics_reports
  data_type: STRING
  description: The date the crash or error occurred, formatted as YYYYMMDD. Partition key for time-based crash trend analysis.

- id: column.crashlytics_reports.event_type
  type: column
  name: event_type
  table: table.crashlytics_reports
  data_type: STRING
  description: The type of stability event — crash (fatal application termination), non_fatal (handled exception), or anr (Application Not Responding timeout).

- id: column.crashlytics_reports.user_pseudo_id
  type: column
  name: user_pseudo_id
  table: table.crashlytics_reports
  data_type: STRING
  description: The pseudonymous player identifier, linking crash reports to player profiles and engagement data for impact assessment.
  entity: entity.player

- id: column.crashlytics_reports.app_version
  type: column
  name: app_version
  table: table.crashlytics_reports
  data_type: STRING
  description: The application version that produced the crash. Essential for identifying version-specific regressions and prioritizing hotfixes.

- id: column.crashlytics_reports.os_version
  type: column
  name: os_version
  table: table.crashlytics_reports
  data_type: STRING
  description: The operating system version on the affected device. Helps identify OS-specific crashes and compatibility issues.

- id: column.crashlytics_reports.device_model
  type: column
  name: device_model
  table: table.crashlytics_reports
  data_type: STRING
  description: The model of the device that experienced the crash. Used to detect device-specific hardware or driver issues.

- id: column.crashlytics_reports.issue_id
  type: column
  name: issue_id
  table: table.crashlytics_reports
  data_type: STRING
  description: The Crashlytics issue group identifier. Groups individual crash reports by root cause for aggregate impact analysis.

- id: column.crashlytics_reports.issue_title
  type: column
  name: issue_title
  table: table.crashlytics_reports
  data_type: STRING
  description: Human-readable title of the crash issue, typically the exception class and top-of-stack method. Used for quick triage and prioritization.

- id: column.crashlytics_reports.blame_frame
  type: column
  name: blame_frame
  table: table.crashlytics_reports
  data_type: STRING
  description: The stack frame identified by Crashlytics as the most likely root cause of the crash. Accelerates debugging by pointing engineers to the responsible code.

# --- dws_daily_active_users columns ---

- id: column.dws_daily_active_users.date
  type: column
  name: date
  table: table.dws_daily_active_users
  data_type: STRING
  description: The reporting date in YYYYMMDD format. Partition key for efficient time-range queries on engagement metrics.

- id: column.dws_daily_active_users.platform
  type: column
  name: platform
  table: table.dws_daily_active_users
  data_type: STRING
  description: The platform dimension (ANDROID, IOS, WEB). Enables platform-level engagement comparison and trend analysis.

- id: column.dws_daily_active_users.country
  type: column
  name: country
  table: table.dws_daily_active_users
  data_type: STRING
  description: The country dimension for geographic segmentation of active user metrics.

- id: column.dws_daily_active_users.dau
  type: column
  name: dau
  table: table.dws_daily_active_users
  data_type: BIGINT
  description: Daily Active Users — the count of unique players who triggered at least one event on this date, platform, and country combination.

- id: column.dws_daily_active_users.wau
  type: column
  name: wau
  table: table.dws_daily_active_users
  data_type: BIGINT
  description: Weekly Active Users — the count of unique players active in the trailing 7-day window ending on this date.

- id: column.dws_daily_active_users.mau
  type: column
  name: mau
  table: table.dws_daily_active_users
  data_type: BIGINT
  description: Monthly Active Users — the count of unique players active in the trailing 30-day window ending on this date.

- id: column.dws_daily_active_users.new_users
  type: column
  name: new_users
  table: table.dws_daily_active_users
  data_type: BIGINT
  description: The number of first-time players whose first_open event occurred on this date. A key growth and acquisition metric.

- id: column.dws_daily_active_users.returning_users
  type: column
  name: returning_users
  table: table.dws_daily_active_users
  data_type: BIGINT
  description: The number of players who were active on this date and had a first_open event on a prior date. Measures the health of the returning player base.

- id: column.dws_daily_active_users.avg_session_duration_sec
  type: column
  name: avg_session_duration_sec
  table: table.dws_daily_active_users
  data_type: DOUBLE
  description: The average session duration in seconds across all sessions on this date. A proxy for engagement depth and content quality.

- id: column.dws_daily_active_users.sessions_per_user
  type: column
  name: sessions_per_user
  table: table.dws_daily_active_users
  data_type: DOUBLE
  description: The average number of sessions per active player on this date. Higher values indicate stronger daily engagement habits.

# --- dws_revenue_daily columns ---

- id: column.dws_revenue_daily.date
  type: column
  name: date
  table: table.dws_revenue_daily
  data_type: STRING
  description: The reporting date in YYYYMMDD format. Partition key for time-series revenue analysis.

- id: column.dws_revenue_daily.platform
  type: column
  name: platform
  table: table.dws_revenue_daily
  data_type: STRING
  description: The platform dimension (ANDROID, IOS, WEB) for platform-level revenue breakdown.

- id: column.dws_revenue_daily.country
  type: column
  name: country
  table: table.dws_revenue_daily
  data_type: STRING
  description: The country dimension for geographic revenue segmentation and regional performance tracking.

- id: column.dws_revenue_daily.iap_revenue_usd
  type: column
  name: iap_revenue_usd
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: Total in-app purchase revenue in USD for this date, platform, and country. Includes all completed purchase transactions.

- id: column.dws_revenue_daily.ad_revenue_usd
  type: column
  name: ad_revenue_usd
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: Total advertising revenue in USD, aggregated from rewarded video, interstitial, and banner ad impressions.

- id: column.dws_revenue_daily.subscription_revenue_usd
  type: column
  name: subscription_revenue_usd
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: Total subscription revenue in USD, including initial purchases and renewals.

- id: column.dws_revenue_daily.total_revenue_usd
  type: column
  name: total_revenue_usd
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: Sum of all revenue streams (IAP + ads + subscriptions) in USD. The headline revenue metric for executive reporting.

- id: column.dws_revenue_daily.paying_users
  type: column
  name: paying_users
  table: table.dws_revenue_daily
  data_type: BIGINT
  description: The number of unique players who made at least one purchase (IAP or subscription) on this date.

- id: column.dws_revenue_daily.transactions
  type: column
  name: transactions
  table: table.dws_revenue_daily
  data_type: BIGINT
  description: The total number of completed purchase transactions on this date. A single player may contribute multiple transactions.

- id: column.dws_revenue_daily.arpu
  type: column
  name: arpu
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: Average Revenue Per User — total_revenue_usd divided by DAU. Measures the average monetization yield across all active players.

- id: column.dws_revenue_daily.arppu
  type: column
  name: arppu
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: Average Revenue Per Paying User — total_revenue_usd divided by paying_users. Measures spending intensity among players who convert.

- id: column.dws_revenue_daily.conversion_rate
  type: column
  name: conversion_rate
  table: table.dws_revenue_daily
  data_type: DOUBLE
  description: The percentage of DAU who made at least one purchase. A key monetization health metric, typically expressed as a decimal (e.g., 0.03 = 3%).

# --- dws_level_funnel columns ---

- id: column.dws_level_funnel.date
  type: column
  name: date
  table: table.dws_level_funnel
  data_type: STRING
  description: The reporting date in YYYYMMDD format. Partition key for tracking level performance trends over time.

- id: column.dws_level_funnel.level_number
  type: column
  name: level_number
  table: table.dws_level_funnel
  data_type: INT
  description: The numeric identifier of the game level. Links to game design data for difficulty and content analysis.
  entity: entity.level

- id: column.dws_level_funnel.level_name
  type: column
  name: level_name
  table: table.dws_level_funnel
  data_type: STRING
  description: The human-readable name or label of the game level, as displayed to the player in the UI.

- id: column.dws_level_funnel.starts
  type: column
  name: starts
  table: table.dws_level_funnel
  data_type: BIGINT
  description: The total number of times this level was started (including retries) on this date. The top of the level completion funnel.

- id: column.dws_level_funnel.completions
  type: column
  name: completions
  table: table.dws_level_funnel
  data_type: BIGINT
  description: The total number of successful level completions on this date. Compared against starts to calculate the completion rate.

- id: column.dws_level_funnel.failures
  type: column
  name: failures
  table: table.dws_level_funnel
  data_type: BIGINT
  description: The total number of level failures (player ran out of moves or time) on this date. High failure rates may indicate difficulty balancing issues.

- id: column.dws_level_funnel.completion_rate
  type: column
  name: completion_rate
  table: table.dws_level_funnel
  data_type: DOUBLE
  description: The ratio of completions to starts, expressed as a decimal. The primary metric for evaluating level difficulty and player success.

- id: column.dws_level_funnel.avg_duration_sec
  type: column
  name: avg_duration_sec
  table: table.dws_level_funnel
  data_type: DOUBLE
  description: The average time in seconds players spent on a single attempt of this level. Indicates level complexity and engagement.

- id: column.dws_level_funnel.avg_attempts
  type: column
  name: avg_attempts
  table: table.dws_level_funnel
  data_type: DOUBLE
  description: The average number of attempts players needed before completing this level. High values suggest the level may be frustrating.

- id: column.dws_level_funnel.unique_players
  type: column
  name: unique_players
  table: table.dws_level_funnel
  data_type: BIGINT
  description: The number of distinct players who attempted this level on this date. Provides reach context for the funnel metrics.

- id: column.dws_level_funnel.first_time_completion_rate
  type: column
  name: first_time_completion_rate
  table: table.dws_level_funnel
  data_type: DOUBLE
  description: The percentage of players who completed this level on their first attempt. A more stringent measure of level accessibility than overall completion rate.

# --- dws_session_stats columns ---

- id: column.dws_session_stats.date
  type: column
  name: date
  table: table.dws_session_stats
  data_type: STRING
  description: The reporting date in YYYYMMDD format. Partition key for session behavior trend analysis.

- id: column.dws_session_stats.platform
  type: column
  name: platform
  table: table.dws_session_stats
  data_type: STRING
  description: The platform dimension (ANDROID, IOS, WEB) for comparing session behavior across platforms.

- id: column.dws_session_stats.country
  type: column
  name: country
  table: table.dws_session_stats
  data_type: STRING
  description: The country dimension for geographic segmentation of session metrics.

- id: column.dws_session_stats.total_sessions
  type: column
  name: total_sessions
  table: table.dws_session_stats
  data_type: BIGINT
  description: The total number of sessions recorded on this date for this platform and country combination.

- id: column.dws_session_stats.unique_users
  type: column
  name: unique_users
  table: table.dws_session_stats
  data_type: BIGINT
  description: The number of distinct players who had at least one session on this date. Equivalent to DAU for this dimension slice.

- id: column.dws_session_stats.avg_session_duration_sec
  type: column
  name: avg_session_duration_sec
  table: table.dws_session_stats
  data_type: DOUBLE
  description: The mean session duration in seconds. May be skewed by long-tail sessions; use median for a more robust central tendency.

- id: column.dws_session_stats.median_session_duration_sec
  type: column
  name: median_session_duration_sec
  table: table.dws_session_stats
  data_type: DOUBLE
  description: The median session duration in seconds. More robust than the mean for understanding typical player session length.

- id: column.dws_session_stats.avg_sessions_per_user
  type: column
  name: avg_sessions_per_user
  table: table.dws_session_stats
  data_type: DOUBLE
  description: The average number of sessions per unique player. Higher values indicate stronger daily re-engagement patterns.

- id: column.dws_session_stats.avg_events_per_session
  type: column
  name: avg_events_per_session
  table: table.dws_session_stats
  data_type: DOUBLE
  description: The average number of events triggered per session. A proxy for session depth and interaction richness.

- id: column.dws_session_stats.bounce_rate
  type: column
  name: bounce_rate
  table: table.dws_session_stats
  data_type: DOUBLE
  description: The percentage of sessions with only a single event (or shorter than a minimum threshold). High bounce rates may indicate onboarding or technical issues.

# --- dws_retention_cohort columns ---

- id: column.dws_retention_cohort.cohort_date
  type: column
  name: cohort_date
  table: table.dws_retention_cohort
  data_type: STRING
  description: The install (first_open) date defining the cohort, formatted as YYYYMMDD. Partition key for cohort-based retention lookups.

- id: column.dws_retention_cohort.platform
  type: column
  name: platform
  table: table.dws_retention_cohort
  data_type: STRING
  description: The platform dimension for comparing retention curves across Android, iOS, and Web.

- id: column.dws_retention_cohort.country
  type: column
  name: country
  table: table.dws_retention_cohort
  data_type: STRING
  description: The country dimension for geographic retention analysis and identifying regional engagement differences.

- id: column.dws_retention_cohort.cohort_size
  type: column
  name: cohort_size
  table: table.dws_retention_cohort
  data_type: BIGINT
  description: The number of new players in this cohort (i.e., players who first opened the app on cohort_date for this platform and country).

- id: column.dws_retention_cohort.d1_retained
  type: column
  name: d1_retained
  table: table.dws_retention_cohort
  data_type: BIGINT
  description: The number of cohort players who returned and were active on day 1 after install.

- id: column.dws_retention_cohort.d3_retained
  type: column
  name: d3_retained
  table: table.dws_retention_cohort
  data_type: BIGINT
  description: The number of cohort players who returned and were active on day 3 after install.

- id: column.dws_retention_cohort.d7_retained
  type: column
  name: d7_retained
  table: table.dws_retention_cohort
  data_type: BIGINT
  description: The number of cohort players who returned and were active on day 7 after install. A standard industry benchmark for early retention.

- id: column.dws_retention_cohort.d14_retained
  type: column
  name: d14_retained
  table: table.dws_retention_cohort
  data_type: BIGINT
  description: The number of cohort players who returned and were active on day 14 after install.

- id: column.dws_retention_cohort.d30_retained
  type: column
  name: d30_retained
  table: table.dws_retention_cohort
  data_type: BIGINT
  description: The number of cohort players who returned and were active on day 30 after install. The long-term retention benchmark.

- id: column.dws_retention_cohort.d1_rate
  type: column
  name: d1_rate
  table: table.dws_retention_cohort
  data_type: DOUBLE
  description: Day-1 retention rate — d1_retained divided by cohort_size. The most commonly watched early retention metric in the gaming industry.

- id: column.dws_retention_cohort.d7_rate
  type: column
  name: d7_rate
  table: table.dws_retention_cohort
  data_type: DOUBLE
  description: Day-7 retention rate — d7_retained divided by cohort_size. A key mid-term engagement indicator and industry benchmark.

- id: column.dws_retention_cohort.d30_rate
  type: column
  name: d30_rate
  table: table.dws_retention_cohort
  data_type: DOUBLE
  description: Day-30 retention rate — d30_retained divided by cohort_size. Measures long-term stickiness and is correlated with sustainable revenue.

# --- dws_acquisition_channel columns ---

- id: column.dws_acquisition_channel.date
  type: column
  name: date
  table: table.dws_acquisition_channel
  data_type: STRING
  description: The reporting date in YYYYMMDD format. Partition key for tracking acquisition channel performance over time.

- id: column.dws_acquisition_channel.source
  type: column
  name: source
  table: table.dws_acquisition_channel
  data_type: STRING
  description: The acquisition source (e.g., google, facebook, apple_search_ads, organic). Identifies where the player was acquired from.

- id: column.dws_acquisition_channel.medium
  type: column
  name: medium
  table: table.dws_acquisition_channel
  data_type: STRING
  description: The acquisition medium (e.g., cpc, cpi, organic, referral). Combined with source for full channel attribution.

- id: column.dws_acquisition_channel.campaign
  type: column
  name: campaign
  table: table.dws_acquisition_channel
  data_type: STRING
  description: The specific marketing campaign name or identifier. Enables campaign-level ROI analysis and creative performance evaluation.

- id: column.dws_acquisition_channel.installs
  type: column
  name: installs
  table: table.dws_acquisition_channel
  data_type: BIGINT
  description: The number of new app installs attributed to this source, medium, and campaign on this date.

- id: column.dws_acquisition_channel.cost_usd
  type: column
  name: cost_usd
  table: table.dws_acquisition_channel
  data_type: DOUBLE
  description: The total marketing spend in USD for this acquisition channel on this date. Sourced from ad network cost data integrations.

- id: column.dws_acquisition_channel.revenue_usd
  type: column
  name: revenue_usd
  table: table.dws_acquisition_channel
  data_type: DOUBLE
  description: The total revenue in USD generated by players acquired through this channel on this date. Used for ROI calculation.

- id: column.dws_acquisition_channel.roi
  type: column
  name: roi
  table: table.dws_acquisition_channel
  data_type: DOUBLE
  description: Return on investment — (revenue_usd - cost_usd) / cost_usd. A negative value indicates the channel is not yet profitable.

- id: column.dws_acquisition_channel.d1_retention_rate
  type: column
  name: d1_retention_rate
  table: table.dws_acquisition_channel
  data_type: DOUBLE
  description: Day-1 retention rate for players acquired through this channel. Indicates acquisition quality beyond volume.

- id: column.dws_acquisition_channel.d7_retention_rate
  type: column
  name: d7_retention_rate
  table: table.dws_acquisition_channel
  data_type: DOUBLE
  description: Day-7 retention rate for players acquired through this channel. A stronger signal of player quality than D1 retention.

- id: column.dws_acquisition_channel.cost_per_install
  type: column
  name: cost_per_install
  table: table.dws_acquisition_channel
  data_type: DOUBLE
  description: Cost per install (CPI) — cost_usd divided by installs. The primary efficiency metric for user acquisition budget management.

# --- dim_events columns ---

- id: column.dim_events.event_name
  type: column
  name: event_name
  table: table.dim_events
  data_type: STRING
  description: The canonical event name, serving as the primary key. Joins to events.event_name for enrichment.
  entity: entity.event

- id: column.dim_events.event_category
  type: column
  name: event_category
  table: table.dim_events
  data_type: STRING
  description: The business category of the event (e.g., engagement, monetization, progression, social). Used for grouping events in reports.

- id: column.dim_events.event_description
  type: column
  name: event_description
  table: table.dim_events
  data_type: STRING
  description: A human-readable description of what the event represents and when it fires. Provides business context for analysts.

- id: column.dim_events.is_auto_collected
  type: column
  name: is_auto_collected
  table: table.dim_events
  data_type: BOOLEAN
  description: Flag indicating whether the event is automatically collected by the Firebase SDK (true) or custom-instrumented by the development team (false).

- id: column.dim_events.is_conversion
  type: column
  name: is_conversion
  table: table.dim_events
  data_type: BOOLEAN
  description: Flag indicating whether the event has been marked as a conversion in the Firebase console. Conversion events drive attribution and funnel reporting.

- id: column.dim_events.event_group
  type: column
  name: event_group
  table: table.dim_events
  data_type: STRING
  description: A higher-level grouping for events (e.g., core_loop, ftue, store, social). Enables aggregate analysis across related event types.

# --- dim_countries columns ---

- id: column.dim_countries.country_code
  type: column
  name: country_code
  table: table.dim_countries
  data_type: STRING
  description: ISO 3166-1 alpha-2 country code (e.g., US, JP, BR). The primary key joining to event and aggregation tables.

- id: column.dim_countries.country_name
  type: column
  name: country_name
  table: table.dim_countries
  data_type: STRING
  description: The full English name of the country (e.g., United States, Japan, Brazil). Used for display in dashboards and reports.

- id: column.dim_countries.region
  type: column
  name: region
  table: table.dim_countries
  data_type: STRING
  description: The geographic region within the continent (e.g., Northern America, Southeast Asia, Western Europe). Enables regional rollup reporting.

- id: column.dim_countries.sub_continent
  type: column
  name: sub_continent
  table: table.dim_countries
  data_type: STRING
  description: The sub-continental grouping (e.g., Northern America, Eastern Asia, Southern Europe). A mid-level geographic hierarchy.

- id: column.dim_countries.continent
  type: column
  name: continent
  table: table.dim_countries
  data_type: STRING
  description: The continent name (e.g., Americas, Asia, Europe, Africa, Oceania). The top-level geographic hierarchy for global rollups.

- id: column.dim_countries.currency_code
  type: column
  name: currency_code
  table: table.dim_countries
  data_type: STRING
  description: The primary local currency code (e.g., USD, JPY, BRL). Used for revenue localization and currency conversion context.

- id: column.dim_countries.tier
  type: column
  name: tier
  table: table.dim_countries
  data_type: STRING
  description: Market tier classification (e.g., T1, T2, T3) based on purchasing power and ad market maturity. Drives regional monetization strategy and CPI benchmarks.

# --- dim_devices columns ---

- id: column.dim_devices.device_model
  type: column
  name: device_model
  table: table.dim_devices
  data_type: STRING
  description: The specific device model identifier (e.g., Pixel 7, SM-G991B, iPhone 14). Part of the composite primary key.

- id: column.dim_devices.device_brand
  type: column
  name: device_brand
  table: table.dim_devices
  data_type: STRING
  description: The manufacturer or brand of the device (e.g., Google, Samsung, Apple). Used for brand-level performance segmentation.

- id: column.dim_devices.device_category
  type: column
  name: device_category
  table: table.dim_devices
  data_type: STRING
  description: The form factor category of the device (e.g., mobile, tablet, desktop). Influences UI/UX optimization priorities.

- id: column.dim_devices.operating_system
  type: column
  name: operating_system
  table: table.dim_devices
  data_type: STRING
  description: The operating system name (e.g., Android, iOS). Part of the composite primary key alongside device_model.

- id: column.dim_devices.os_version
  type: column
  name: os_version
  table: table.dim_devices
  data_type: STRING
  description: The OS version string (e.g., 14.0, 13). Used for minimum OS version support decisions and version-specific bug tracking.

- id: column.dim_devices.screen_resolution
  type: column
  name: screen_resolution
  table: table.dim_devices
  data_type: STRING
  description: The screen resolution of the device (e.g., 1080x2400, 2532x1170). Important for UI asset optimization and rendering performance analysis.

- id: column.dim_devices.is_supported
  type: column
  name: is_supported
  table: table.dim_devices
  data_type: BOOLEAN
  description: Flag indicating whether the device is officially supported by the current game version. Unsupported devices may experience degraded performance.

# --- dim_items columns ---

- id: column.dim_items.item_id
  type: column
  name: item_id
  table: table.dim_items
  data_type: STRING
  description: The unique identifier for the in-game item or product SKU. Primary key linking to purchase events and revenue analysis.
  entity: entity.item

- id: column.dim_items.item_name
  type: column
  name: item_name
  table: table.dim_items
  data_type: STRING
  description: The display name of the item as shown to players in the in-game store (e.g., "Gem Pack 500", "Premium Pass").

- id: column.dim_items.item_category
  type: column
  name: item_category
  table: table.dim_items
  data_type: STRING
  description: The category of the item (e.g., currency_pack, power_up, cosmetic, subscription). Used for category-level revenue analysis.

- id: column.dim_items.item_type
  type: column
  name: item_type
  table: table.dim_items
  data_type: STRING
  description: The type classification of the item (e.g., virtual_currency, booster, skin, bundle). A finer-grained classification than item_category.

- id: column.dim_items.price_usd
  type: column
  name: price_usd
  table: table.dim_items
  data_type: DOUBLE
  description: The base price of the item in US dollars. Used for revenue forecasting and price point optimization analysis.

- id: column.dim_items.currency_type
  type: column
  name: currency_type
  table: table.dim_items
  data_type: STRING
  description: The currency used to purchase this item (e.g., real_money, gems, coins). Distinguishes between hard-currency and soft-currency items.

- id: column.dim_items.is_consumable
  type: column
  name: is_consumable
  table: table.dim_items
  data_type: BOOLEAN
  description: Whether the item is consumed upon use (true) or permanently owned (false). Consumable items drive repeat purchases and recurring revenue.

- id: column.dim_items.rarity
  type: column
  name: rarity
  table: table.dim_items
  data_type: STRING
  description: The rarity tier of the item (e.g., common, rare, epic, legendary). Affects perceived value and influences pricing strategy.

- id: column.dim_items.description
  type: column
  name: description
  table: table.dim_items
  data_type: STRING
  description: A text description of the item's function or benefit, as displayed in the in-game item detail view.

# --- ads_player_ltv columns ---

- id: column.ads_player_ltv.user_pseudo_id
  type: column
  name: user_pseudo_id
  table: table.ads_player_ltv
  data_type: STRING
  description: The pseudonymous player identifier for whom the LTV prediction is generated.
  entity: entity.player

- id: column.ads_player_ltv.prediction_date
  type: column
  name: prediction_date
  table: table.ads_player_ltv
  data_type: STRING
  description: The date the LTV prediction was generated, in YYYYMMDD format. Partition key enabling comparison of predictions over time.

- id: column.ads_player_ltv.predicted_ltv_usd
  type: column
  name: predicted_ltv_usd
  table: table.ads_player_ltv
  data_type: DOUBLE
  description: The model's predicted total lifetime value for this player in USD, covering all future monetization from IAP, ads, and subscriptions.

- id: column.ads_player_ltv.ltv_percentile
  type: column
  name: ltv_percentile
  table: table.ads_player_ltv
  data_type: INT
  description: The player's percentile rank within the LTV distribution (0-100). Players at the 99th percentile are whale-tier high-value players.

- id: column.ads_player_ltv.days_since_install
  type: column
  name: days_since_install
  table: table.ads_player_ltv
  data_type: INT
  description: The number of days between the player's first_open event and the prediction_date. Provides context for the prediction's maturity.

- id: column.ads_player_ltv.total_spend_usd
  type: column
  name: total_spend_usd
  table: table.ads_player_ltv
  data_type: DOUBLE
  description: The player's cumulative in-app purchase spending in USD up to the prediction_date. A key input feature to the LTV model.

- id: column.ads_player_ltv.total_sessions
  type: column
  name: total_sessions
  table: table.ads_player_ltv
  data_type: BIGINT
  description: The player's cumulative session count up to the prediction_date. An engagement signal used as an input feature to the LTV model.

- id: column.ads_player_ltv.predicted_30d_revenue
  type: column
  name: predicted_30d_revenue
  table: table.ads_player_ltv
  data_type: DOUBLE
  description: The model's predicted revenue from this player over the next 30 days in USD. A shorter-horizon prediction useful for near-term planning.

- id: column.ads_player_ltv.confidence_score
  type: column
  name: confidence_score
  table: table.ads_player_ltv
  data_type: DOUBLE
  description: The model's confidence in the LTV prediction, expressed as a value between 0 and 1. Lower scores indicate higher uncertainty, often for new players.

- id: column.ads_player_ltv.ltv_segment
  type: column
  name: ltv_segment
  table: table.ads_player_ltv
  data_type: STRING
  description: The LTV-based player segment label (e.g., whale, dolphin, minnow, free_player). Derived from predicted_ltv_usd thresholds for use in targeting rules.

# --- ads_churn_prediction columns ---

- id: column.ads_churn_prediction.user_pseudo_id
  type: column
  name: user_pseudo_id
  table: table.ads_churn_prediction
  data_type: STRING
  description: The pseudonymous player identifier for whom the churn prediction is generated.
  entity: entity.player

- id: column.ads_churn_prediction.prediction_date
  type: column
  name: prediction_date
  table: table.ads_churn_prediction
  data_type: STRING
  description: The date the churn prediction was generated, in YYYYMMDD format. Partition key for tracking prediction freshness.

- id: column.ads_churn_prediction.churn_probability
  type: column
  name: churn_probability
  table: table.ads_churn_prediction
  data_type: DOUBLE
  description: The estimated probability (0.0 to 1.0) that this player will not return within the next 7 days. Higher values indicate greater churn risk.

- id: column.ads_churn_prediction.risk_tier
  type: column
  name: risk_tier
  table: table.ads_churn_prediction
  data_type: STRING
  description: The categorical churn risk tier (e.g., low, medium, high, critical). Derived from churn_probability thresholds for use in retention campaign targeting.

- id: column.ads_churn_prediction.days_inactive
  type: column
  name: days_inactive
  table: table.ads_churn_prediction
  data_type: INT
  description: The number of consecutive days the player has been inactive as of the prediction_date. A strong behavioral predictor of churn.

- id: column.ads_churn_prediction.last_active_date
  type: column
  name: last_active_date
  table: table.ads_churn_prediction
  data_type: STRING
  description: The most recent date the player was active, in YYYYMMDD format. Provides recency context for the churn prediction.

- id: column.ads_churn_prediction.sessions_last_7d
  type: column
  name: sessions_last_7d
  table: table.ads_churn_prediction
  data_type: INT
  description: The number of sessions the player had in the 7 days preceding the prediction_date. A key engagement feature for the churn model.

- id: column.ads_churn_prediction.engagement_score
  type: column
  name: engagement_score
  table: table.ads_churn_prediction
  data_type: DOUBLE
  description: A composite engagement score (0.0 to 1.0) combining session frequency, duration, and depth. Used as a feature in the churn model and for player health monitoring.

- id: column.ads_churn_prediction.win_back_likelihood
  type: column
  name: win_back_likelihood
  table: table.ads_churn_prediction
  data_type: DOUBLE
  description: The estimated probability (0.0 to 1.0) that a targeted retention intervention will successfully bring this player back. Used to prioritize intervention spend.

- id: column.ads_churn_prediction.recommended_action
  type: column
  name: recommended_action
  table: table.ads_churn_prediction
  data_type: STRING
  description: The model-recommended retention intervention (e.g., push_notification, bonus_reward, discount_offer, personal_message). Actionable output for the LiveOps team.

# --- ads_ab_test_results columns ---

- id: column.ads_ab_test_results.experiment_id
  type: column
  name: experiment_id
  table: table.ads_ab_test_results
  data_type: STRING
  description: The unique identifier for the A/B test experiment. Part of the composite primary key and used for joining to experiment metadata.
  entity: entity.experiment

- id: column.ads_ab_test_results.experiment_name
  type: column
  name: experiment_name
  table: table.ads_ab_test_results
  data_type: STRING
  description: The human-readable name of the experiment (e.g., "New Tutorial Flow v2", "Holiday Sale Banner"). Used for display in experiment dashboards.

- id: column.ads_ab_test_results.variant
  type: column
  name: variant
  table: table.ads_ab_test_results
  data_type: STRING
  description: The variant name within the experiment (e.g., control, variant_a, variant_b). Part of the composite primary key.

- id: column.ads_ab_test_results.start_date
  type: column
  name: start_date
  table: table.ads_ab_test_results
  data_type: STRING
  description: The date the experiment started collecting data, in YYYYMMDD format. Defines the observation window start.

- id: column.ads_ab_test_results.end_date
  type: column
  name: end_date
  table: table.ads_ab_test_results
  data_type: STRING
  description: The date the experiment stopped collecting data, in YYYYMMDD format. May be null for ongoing experiments.

- id: column.ads_ab_test_results.sample_size
  type: column
  name: sample_size
  table: table.ads_ab_test_results
  data_type: BIGINT
  description: The number of players assigned to this variant. Required for statistical power assessment and significance calculations.

- id: column.ads_ab_test_results.conversion_rate
  type: column
  name: conversion_rate
  table: table.ads_ab_test_results
  data_type: DOUBLE
  description: The primary conversion rate for this variant, expressed as a decimal. The definition of "conversion" is experiment-specific (e.g., purchase, level completion).

- id: column.ads_ab_test_results.revenue_per_user
  type: column
  name: revenue_per_user
  table: table.ads_ab_test_results
  data_type: DOUBLE
  description: The average revenue generated per player in this variant during the experiment window. A key metric for monetization experiments.

- id: column.ads_ab_test_results.retention_d7
  type: column
  name: retention_d7
  table: table.ads_ab_test_results
  data_type: DOUBLE
  description: The day-7 retention rate for players in this variant. Used to evaluate whether the experiment positively or negatively impacts player retention.

